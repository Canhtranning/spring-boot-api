# Server Configuration - Render/Railway inject PORT tự động
server.port=${PORT:-8080}

# =============================================
# H2 Database - LOCAL development
# =============================================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate SQL format + hiện giá trị thực thay vì ?
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Log request/response - chỉ bật ở local, tắt ở production để tăng tốc
logging.level.org.springframework.web=INFO
logging.level.com.example.api=DEBUG

# Tắt open-in-view để tăng performance
spring.jpa.open-in-view=false

# Lazy initialization để start nhanh hơn
spring.main.lazy-initialization=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Application Name
spring.application.name=Spring Boot API Demo
